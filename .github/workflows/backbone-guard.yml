name: Backbone Guard

on:
  pull_request:
  push:

jobs:
  backbone-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backbone guard
        run: npm run guard:backbone
